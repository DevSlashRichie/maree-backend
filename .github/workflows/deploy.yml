name: Build & Deploy to Azure

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: TypeScript type check
        run: bun run ts:check

      - name: Lint
        run: bun run check

      - name: Run tests
        run: bun test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        run: |
          az acr build \
            -r ${{ secrets.ACR_NAME }} \
            -t maree:${{ github.sha }} \
            --file Dockerfile .

      - name: Tag as latest
        if: github.ref == 'refs/heads/main'
        run: |
          az acr build \
            -r ${{ secrets.ACR_NAME }} \
            -t maree:latest \
            --file Dockerfile .

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        run: |
          IMAGE="${{ secrets.ACR_NAME }}.azurecr.io/maree:${{ github.sha }}"

          az containerapp update \
            --name maree \
            --resource-group maree-prod-rg \
            --image $IMAGE
