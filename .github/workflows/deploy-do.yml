name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push backend image
        run: |
          REGISTRY=$(doctl registry get --format Endpoint --no-header)
          docker build -t $REGISTRY/maree-backend:latest .
          docker push $REGISTRY/maree-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout code (for infra files)
        uses: actions/checkout@v4

      - name: Copy files to Droplet
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "infra/digitalocean/docker-compose.yaml,infra/digitalocean/Caddyfile"
          target: "/root/maree"
          strip_components: 2

      - name: Execute deployment via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/maree
            doctl registry login --expiry-seconds 600
            export REGISTRY_URL=$(doctl registry get --format Endpoint --no-header)
            docker compose pull
            docker compose up -d --force-recreate
